services:
  postgres:
    image: postgres:16-alpine
    environment:
    # 사내/로컬 전용 기본값 — postgres 포트는 호스트에 노출하지 않음(외부 직접 접근 불가).
    # 운영 배포 시 반드시 변경하고 backend/.env 의 DATABASE_URL 도 함께 맞출 것.
      POSTGRES_USER: llsollu
      POSTGRES_PASSWORD: llsollu
      POSTGRES_DB: llsollu_email_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llsollu -d llsollu_email_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redisdata:/data

  api:
    build: ../backend
    env_file: ../backend/.env
    # 컨테이너 시계를 KST로 맞춰 로그 타임스탬프가 SCHEDULER_TZ(Asia/Seoul)와 일치하도록.
    # 스케줄 계산/저장은 코드에서 명시적 tz(ZoneInfo)로 처리하므로 이 값과 무관하게 정확함.
    environment:
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Flutter web 빌드를 이 경로에 두면 API가 / 에서 서빙
    volumes:
      - ../frontend/build/web:/app/web:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: ../backend
    env_file: ../backend/.env
    environment:
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["arq", "app.workers.worker.WorkerSettings"]

volumes:
  pgdata:
  redisdata:
